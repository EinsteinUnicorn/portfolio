<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Becky Button</title>
  <!-- Preload all images so the browser fetches them immediately on parse -->
  <link rel="preload" as="image" href="15e05ee9c5a6f8ea807161f338e129a3e200f260.png">
  <link rel="preload" as="image" href="fdf3472b8e5757c0d00891bfd23f6e26236eea90.png">
  <link rel="preload" as="image" href="c52bd55dc40f4c41d59558c739b89c67c72d1523.png">
  <link rel="preload" as="image" href="2e9c956df68310be3393d81b1a1d2290e4c0c469.png">
  <link rel="preload" as="image" href="aa6b4d617f01a3a42998798e122c8e8a02d0b8be.png">
  <link rel="preload" as="image" href="e617713c7713bde361e18ce07e459a3e6f1063e1.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: sans-serif;
      min-height: 100vh;
    }

    /* Outer page — 15% side padding keeps shelf inset from viewport edges */
    .page {
      padding: 0 15% 40px;
    }

    /* Content block — shelf + header, centred at any viewport width.
       Max width matches the Figma shelf width (817px). */
    .content-wrap {
      max-width: 817px;
      margin: 0 auto;
      padding-top: clamp(20px, 10.4vw, 121px); /* 10.4vw = 121px at 1165px viewport */
    }

    /* 14" MacBook Pro (~1440px+): 30% padding. Shelf width is capped so the
       full shelf (+ header) fits in the viewport without scrolling.
       calc: available height minus ~250px of header/spacing, converted to
       the equivalent shelf width via the 817:899 aspect ratio. */
    @media (min-width: 1440px) {
      .page { padding: 0 30% 20px; }
      .content-wrap { padding-top: 20px; }
      .shelf {
        width: min(100%, calc((100dvh - 250px) * (817 / 899)));
        margin-left: auto;
        margin-right: auto;
      }
    }

    /* ---- Header ---- */
    .site-header {
      margin-bottom: clamp(8px, 2vw, 24px);
      padding-left: clamp(4px, 4.04%, 33px); /* Figma: text at 381px, shelf at 348px → 33px offset */
    }

    .name {
      font-family: 'Baskerville', 'Palatino Linotype', serif;
      font-size: clamp(32px, 8.2vw, 96px);
      font-weight: normal;
      color: #000;
      line-height: 1.05;
    }

    .role {
      font-family: 'Futura', 'Century Gothic', sans-serif;
      font-size: clamp(12px, 2.1vw, 24px);
      font-weight: 500;
      color: #000;
      letter-spacing: 0.05em;
      margin-top: 0.15em;
    }

    /* ---- Shelf ---- */
    .shelf {
      position: relative;
      width: 100%;
      aspect-ratio: 817 / 899;
      overflow: hidden;
      margin-top: clamp(8px, 2vw, 24px);
    }

    /* Replicate the exact Figma crop: the shelf image is larger than its
       container and positioned with specific offsets — percentages keep
       this identical at every viewport width. */
    .shelf-bg {
      position: absolute;
      width: 126.32%;
      height: 114.67%;
      left: -13.71%;
      top: -8.4%;
      pointer-events: none;
      display: block;
    }

    /* ---- Project items (% coords relative to shelf) ----
       All values derived from Figma px positions offset by the shelf origin (348, 288).
       left%  = (item_left  - 348) / 817
       top%   = (item_top   - 288) / 899
       width% = item_width  / 817
       height%= item_height / 899                          */

    .project-item {
      position: absolute;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }
    .project-item:hover {
      transform: scale(1.07);
      filter: brightness(1.08) drop-shadow(0 4px 12px rgba(0,0,0,0.18));
      z-index: 10;
    }
    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Silver wearable device — top-left compartment */
    .proj-device {
      left:   10.77%;  /* (436-348)/817 */
      bottom: 68.74%;  /* (899-54-227)/899 */
      width:  17.38%;  /* 142/817 */
      height: 25.25%;  /* 227/899 */
    }

    /* Lamp — top-right compartment, slight rotation */
    .proj-pickleball {
      left:   61.20%;  /* (848-348)/817 */
      bottom: 73.58%;  /* (899-54-183)/899 */
      width:  22.90%;  /* 187/817 */
      height: 20.41%;  /* 183/899 */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .proj-pickleball .inner {
      transform: rotate(4.49deg);
      width: 93%;
      height: 93%;
    }
    .proj-pickleball .inner img { object-fit: cover; }

    /* Twinkle Toes PCB — middle-left compartment */
    .proj-twinkle {
      left:   9.67%;   /* (427-348)/817 */
      bottom: 35.71%;  /* (899-336-242)/899 */
      width:  19.71%;  /* 161/817 */
      height: 26.92%;  /* 242/899 */
    }

    /* Braille printer — bottom-left */
    .proj-led {
      left:   12.61%;  /* (451-348)/817 */
      bottom: 12.35%;  /* (899-652-136)/899 */
      width:  31.09%;  /* 254/817 */
      height: 15.13%;  /* 136/899 */
      overflow: hidden;
    }
    .proj-led img {
      position: absolute;
      width: 106.36%;
      height: 166.31%;
      left: -6.36%;
      top: -38.35%;
      object-fit: cover;
    }

    /* Tea app — bottom-right */
    .proj-tea {
      left:   54.59%;   /* (794-348)/817 */
      bottom: 12.35%;   /* anchored to shelf board */
      width:  33.78%;   /* 276/817 */
      height: 17.57%;   /* 158/899 */
      overflow: hidden;
    }
    .proj-tea img {
      position: absolute;
      width: 100%;
      height: 109.97%;
      left: 0;
      top: -9.97%;
    }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 4px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: clamp(24px, 5vw, 44px);
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #555;
      line-height: 1;
      padding: 4px;
    }
    .modal-close:hover { color: #000; }

    .modal-image {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      margin-bottom: 20px;
      display: block;
    }

    .modal-title {
      font-family: 'Baskerville', 'Palatino Linotype', serif;
      font-size: clamp(22px, 4vw, 32px);
      font-weight: normal;
      color: #000;
      margin-bottom: 8px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .modal-tag {
      font-family: 'Futura', 'Century Gothic', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      border: 1px solid #ccc;
      border-radius: 2px;
      padding: 3px 8px;
    }

    .modal-desc {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(14px, 2vw, 16px);
      line-height: 1.65;
      color: #333;
    }

    .modal-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-link-btn {
      font-family: 'Futura', 'Century Gothic', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
      border: 1px solid #000;
      border-radius: 2px;
      padding: 7px 16px;
      text-decoration: none;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .modal-link-btn:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="page">
 <div class="content-wrap">

  <header class="site-header">
    <h1 class="name">Becky Button</h1>
  </header>

  <div class="shelf">
    <img class="shelf-bg" src="15e05ee9c5a6f8ea807161f338e129a3e200f260.png" alt="" />

    <div class="project-item proj-device" data-project="device">
      <img src="fdf3472b8e5757c0d00891bfd23f6e26236eea90.png" alt="Wearable device" />
    </div>

    <div class="project-item proj-pickleball" data-project="pickleball">
      <div class="inner">
        <img src="c52bd55dc40f4c41d59558c739b89c67c72d1523.png" alt="Pickleball sensor" />
      </div>
    </div>

    <div class="project-item proj-twinkle" data-project="twinkle">
      <img src="2e9c956df68310be3393d81b1a1d2290e4c0c469.png" alt="Twinkle Toes PCB" />
    </div>

    <div class="project-item proj-led" data-project="led">
      <img src="aa6b4d617f01a3a42998798e122c8e8a02d0b8be.png" alt="LED matrix panel" />
    </div>

    <div class="project-item proj-tea" data-project="tea">
      <img src="e617713c7713bde361e18ce07e459a3e6f1063e1.png" alt="Tea sourcing app" />
    </div>
  </div>

 </div><!-- /.content-wrap -->
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <img class="modal-image" id="modal-image" src="" alt="" />
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-tags" id="modal-tags"></div>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="modal-links" id="modal-links"></div>
  </div>
</div>

<script>
  const projects = {
    device: {
      image: "fdf3472b8e5757c0d00891bfd23f6e26236eea90.png",
      title: "Puck v0 - Era Labs",
      tags: ["PCB Design"],
      description: "Custom PCB designed for a wearable — full schematic capture, component selection, and layout optimized for a compact form factor.",
      link: { label: "Link", url: "https://era.world" }
    },
    pickleball: {
      image: "c52bd55dc40f4c41d59558c739b89c67c72d1523.png",
      title: "Lamp",
      tags: ["Fusion 360"],
      description: "Parametric lamp designed in Fusion 360 and 3D printed."
    },
    twinkle: {
      image: "2e9c956df68310be3393d81b1a1d2290e4c0c469.png",
      title: "Twinkle Toes",
      tags: ["PCB Design", "Firmware", "Synthesizer"],
      description: "Open-source, foot-shaped guitar pedal with a reprogrammable Daisy Seed Microcontroller. Custom PCB layout, hand assembly, and firmware.",
      link: { label: "GitHub", url: "https://github.com/EinsteinUnicorn/TwinkleToes" }
    },
    led: {
      image: "aa6b4d617f01a3a42998798e122c8e8a02d0b8be.png",
      title: "Braille Printer",
      tags: ["Design", "Electrical Engineering"],
      description: "Electromechanical braille embosser prototype. I designed the electro-mechanical parts of this and in collaboration with a team, we developed the printing software stack."
    },
    tea: {
      image: "e617713c7713bde361e18ce07e459a3e6f1063e1.png",
      title: "Embroidery Digitizer",
      tags: ["Product Design", "UI/UX", "Full-Stack"],
      description: "Full-stack web app that converts design images into machine-readable embroidery files via a custom vectorization pipeline. React frontend, Node backend, live on Vercel.",
      links: [
        { label: "Live Project", url: "https://open-stitched.vercel.app" },
        { label: "X", url: "https://x.com/becky_button/status/2040687970085167253?s=20" }
      ]
    }
  };

  const overlay  = document.getElementById("modal-overlay");
  const modalImg = document.getElementById("modal-image");
  const modalTitle = document.getElementById("modal-title");
  const modalTags  = document.getElementById("modal-tags");
  const modalDesc  = document.getElementById("modal-desc");
  const modalLinks = document.getElementById("modal-links");

  function openModal(key) {
    const p = projects[key];
    if (!p) return;
    modalImg.src = p.image;
    modalImg.alt = p.title;
    modalTitle.textContent = p.title;
    modalDesc.textContent  = p.description;
    modalTags.innerHTML = p.tags.map(t => `<span class="modal-tag">${t}</span>`).join("");
    const allLinks = p.links || (p.link ? [p.link] : []);
    modalLinks.innerHTML = allLinks.map(l =>
      `<a class="modal-link-btn" href="${l.url}" target="_blank" rel="noopener noreferrer">${l.label}</a>`
    ).join("");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  document.querySelectorAll(".project-item").forEach(el => {
    el.addEventListener("click", () => openModal(el.dataset.project));
  });

  document.getElementById("modal-close").addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>

</body>
</html>
